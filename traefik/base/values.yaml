ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  web-ext:
    port: 8001
    expose:
      default: false
      ext: true
    exposedPort: 80
    protocol: TCP
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32"
        - "10.244.0.0/16"

service:
  additionalServices:
    ext:
      type: ClusterIP

ingressRoute:
  dashboard:
    enabled: true
    entryPoints:
      - websecure
    middlewares:
      - name: traefik-error-pages
      - name: ak-outpost-authentik-embedded-outpost
        namespace: authentik
    tls:
      secretName: traefik-dashboard-tls

providers:
  kubernetesCRD:
    allowCrossNamespace: true
