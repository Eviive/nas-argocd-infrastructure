apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-lens-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir-lens-proxy
  template:
    metadata:
      labels:
        app: mimir-lens-proxy
    spec:
      containers:
        - name: proxy
          image: nginx:1.31.0@sha256:800e7c98538c6bf725f5177e841aa720ae0ed1c378bbea368b6330bfe18a36b3
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MIMIR_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: mimir-lens-proxy
                  key: tenant_id
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              cat /etc/nginx/templates/nginx.template | envsubst '${MIMIR_TENANT_ID}' > /etc/nginx/nginx.conf &&
              nginx -g 'daemon off;'
          volumeMounts:
            - name: config-template
              mountPath: /etc/nginx/templates
      volumes:
        - name: config-template
          configMap:
            name: mimir-lens-proxy
            items:
              - key: nginx.template
                path: nginx.template
