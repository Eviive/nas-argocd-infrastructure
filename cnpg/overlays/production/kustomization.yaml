apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.28.0
    releaseName: cnpg
    namespace: cnpg
    includeCRDs: true
    valuesFile: ../../base/values.yaml
