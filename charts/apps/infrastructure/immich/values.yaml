base:
  pvcs:
    - name: library
      accessModes:
        - ReadWriteOnce
      size: 200Gi
      storageClassName: nfs-hdd-2
      folder: immich/library
  ingressRoutes:
    - routes:
        - match: Host(`immich.home.albertv.dev`)
          services:
            - name: immich-server
              port: http
      dnsNames:
        - immich.home.albertv.dev

immich:
  controllers:
    main:
      containers:
        main:
          env:
            DB_HOSTNAME: immich-cluster-rw.immich.svc.cluster.local
            DB_DATABASE_NAME: immich
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: db-username
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: db-password
            REDIS_HOSTNAME: redis-master.redis.svc.cluster.local
            REDIS_DBINDEX: 3
            REDIS_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: redis-username
            REDIS_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich
                  key: redis-password
  immich:
    persistence:
      library:
        existingClaim: immich-library
  machine-learning:
    persistence:
      cache:
        type: persistentVolumeClaim
        annotations:
          folder: immich/machine-learning
        size: 10Gi
        accessMode: ReadWriteOnce
        storageClass: nfs-ssd-1

cluster:
  databases:
    - name: immich
      owner: immich
      extensions:
        - name: vector
        - name: vchord
        - name: cube
        - name: earthdistance
  cluster:
    instances: 1
    imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.4-1.1.1
    postgresql:
      shared_preload_libraries:
        - vchord.so
    roles:
      - name: immich
        superuser: true
        login: true
    initdb:
      database: immich
      secret:
        name: immich-cnpg
    storage:
      storageClass: nfs-ssd-1
    annotations:
      folder: immich-cnpg
