base:
  ingressRoutes:
    - routes:
        - match: Host(`argocd.home.albertv.dev`)
          services:
            - name: argocd-server
              port: http
      dnsNames:
        - argocd.home.albertv.dev

argo-cd:
  configs:
    cm:
      url: "https://argocd.home.albertv.dev"
      kustomize.buildOptions: "--load-restrictor LoadRestrictionsNone --enable-helm"
      resource.customizations.ignoreDifferences.all: |
        jqPathExpressions:
          - ".webhooks[]?.clientConfig.caBundle"
          - ".spec.conversion.webhook.clientConfig.caBundle"
      dex.config: |
        connectors:
        - id: authentik
          name: authentik
          type: oidc
          config:
            issuer: https://authentik.albertv.dev/application/o/argocd/
            clientID: $dex.authentik.clientID
            clientSecret: $dex.authentik.clientSecret
            insecureEnableGroups: true
            scopes:
              - openid
              - profile
              - email
    params:
      server.insecure: true
    rbac:
      policy.csv: |
        g, ArgoCD Admins, role:admin
        g, ArgoCD, role:readonly

  dex:
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true

  redis:
    enabled: false

  externalRedis:
    host: redis-master.redis.svc.cluster.local
    existingSecret: argocd-secret
