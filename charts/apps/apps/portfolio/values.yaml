base:
  deployments:
    - containers:
        - name: portfolio
          image:
            repository: eviive/repository
            tag: portfolio-1.1.0
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: portfolio-env
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      imagePullSecrets:
        - name: portfolio-image-pull-secret

  services:
    - ports:
        - name: http
          port: 80
          targetPort: http

  ingressRoutes:
    - external: true
      routes:
        - match: Host(`albertv.dev`) || Host(`www.albertv.dev`)
          services:
            - name: portfolio
              port: http
